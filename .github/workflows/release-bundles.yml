name: Release Bundles

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
        default: "v0.1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C debuginfo=line-tables-only --cfg=web_sys_unstable_apis

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - id: release
        name: Resolve release tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          notes="$(mktemp)"
          cat > "$notes" <<'EOF'
          Labrador CLI terminal application release bundles.

          macOS is distributed as a DMG containing Labrador.app and an Applications drop link. Windows is distributed as a setup installer. Linux is distributed as an AppImage plus a Debian package.

          Builds are unsigned unless the repository has platform signing secrets configured.
          EOF

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Labrador CLI $RELEASE_TAG" \
              --notes-file "$notes"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Labrador CLI $RELEASE_TAG" \
              --notes-file "$notes"
          fi

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            shell: bash
          - platform: linux
            os: ubuntu-latest
            shell: bash
          - platform: windows
            os: windows-latest
            shell: pwsh
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup show

      - name: Install release cargo tools
        shell: bash
        run: ./script/install_cargo_release_deps --no-build-deps

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            brotli \
            build-essential \
            cmake \
            curl \
            fakeroot \
            git \
            jq \
            libasound2-dev \
            libexpat1-dev \
            libfontconfig1-dev \
            libfreetype-dev \
            libgit2-dev \
            libssl-dev \
            pkg-config \
            python-is-python3 \
            unzip

          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

          protoc_version="25.1"
          case "$(uname -m)" in
            x86_64) protoc_zip="protoc-${protoc_version}-linux-x86_64.zip" ;;
            aarch64) protoc_zip="protoc-${protoc_version}-linux-aarch_64.zip" ;;
            *) echo "Unsupported architecture for protoc: $(uname -m)"; exit 1 ;;
          esac

          curl -fsSL -o "$RUNNER_TEMP/protoc.zip" \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${protoc_version}/${protoc_zip}"
          sudo unzip -o "$RUNNER_TEMP/protoc.zip" -d /usr/local bin/protoc 'include/*'

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          brew install protobuf create-dmg
          ./script/install_cargo_bundle

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "25.1"
          $archive = "protoc-$version-win64.zip"
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v$version/$archive"
          $zipPath = Join-Path $env:RUNNER_TEMP $archive
          $installDir = Join-Path $env:RUNNER_TEMP "protoc"

          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $installDir -Force
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $installDir "bin")

          choco install innosetup --no-progress -y
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\Inno Setup 6"

      - name: Package Linux app bundles
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          arch="$(uname -m)"
          out_dir="target/release-lto/bundle/linux"

          export PATH="$HOME/.local/bin:$PATH"
          export APPIMAGE_EXTRACT_AND_RUN=1

          ./script/linux/install_linuxdeploy
          ./script/linux/bundle \
            --channel oss \
            --release-tag "$RELEASE_TAG" \
            --packages appimage,deb

          mkdir -p dist
          appimage="$(find "$out_dir" -maxdepth 1 -name '*.AppImage' -print -quit)"
          deb="$(find "$out_dir" -maxdepth 1 -name '*.deb' -print -quit)"
          test -n "$appimage"
          test -n "$deb"

          cp "$appimage" "dist/labradorcli-${version}-linux-${arch}.AppImage"
          case "$arch" in
            x86_64) deb_arch="amd64" ;;
            aarch64) deb_arch="arm64" ;;
            *) deb_arch="$arch" ;;
          esac
          cp "$deb" "dist/labradorcli-${version}-linux-${deb_arch}.deb"

          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' |
            while IFS= read -r name; do
              case "$name" in
                labradorcli-${version}-linux-*)
                  gh release delete-asset "$RELEASE_TAG" "$name" \
                    --repo "$GITHUB_REPOSITORY" \
                    --yes || true
                  ;;
              esac
            done

          gh release upload "$RELEASE_TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Package macOS app DMG
        if: runner.os == 'macOS'
        shell: bash
        env:
          LABRADOR_NOTARIZATION_PASSWORD: ${{ secrets.LABRADOR_NOTARIZATION_PASSWORD }}
          LABRADOR_NOTARIZATION_APPLE_ID: ${{ secrets.LABRADOR_NOTARIZATION_APPLE_ID }}
          LABRADOR_DEVELOPER_ID_CERT: ${{ secrets.LABRADOR_DEVELOPER_ID_CERT }}
          LABRADOR_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.LABRADOR_DEVELOPER_ID_CERT_PASSWORD }}
          LABRADOR_CODESIGN_KEYCHAIN_PASSWORD: ${{ secrets.LABRADOR_CODESIGN_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          asset="labradorcli-${version}-macos-universal.dmg"
          out_dir="target/release-lto/bundle/osx"

          sign_args=(--nosign)
          if [[ -n "${LABRADOR_NOTARIZATION_PASSWORD:-}" &&
                -n "${LABRADOR_NOTARIZATION_APPLE_ID:-}" &&
                -n "${LABRADOR_DEVELOPER_ID_CERT:-}" &&
                -n "${LABRADOR_DEVELOPER_ID_CERT_PASSWORD:-}" &&
                -n "${LABRADOR_CODESIGN_KEYCHAIN_PASSWORD:-}" ]]; then
            sign_args=(--read-passwords-from-env)
          fi

          ./script/macos/bundle \
            --channel oss \
            --release-tag "$RELEASE_TAG" \
            --dmg-name-suffix "$version" \
            "${sign_args[@]}"

          dmg="$(find "$out_dir" -maxdepth 1 -name 'Labrador*.dmg' -print -quit)"
          test -n "$dmg"

          mkdir -p dist
          cp "$dmg" "dist/$asset"

          mount_dir="$(mktemp -d)"
          hdiutil attach "dist/$asset" \
            -mountpoint "$mount_dir" \
            -nobrowse \
            -readonly
          test -d "$mount_dir/Labrador.app"
          test -e "$mount_dir/Applications"
          hdiutil detach "$mount_dir"

          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' |
            while IFS= read -r name; do
              case "$name" in
                labradorcli-${version}-macos-*.dmg)
                  gh release delete-asset "$RELEASE_TAG" "$name" \
                    --repo "$GITHUB_REPOSITORY" \
                    --yes || true
                  ;;
              esac
            done

          gh release upload "$RELEASE_TAG" "dist/$asset" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Package Windows installer
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG.TrimStart("v")
          $asset = "labradorcli-$version-windows-x64-setup.exe"

          .\script\windows\bundle.ps1 `
            -CHANNEL oss `
            -RELEASE_TAG $env:RELEASE_TAG `
            -ARCH x64

          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item script/windows/Output/LabradorSetup.exe "dist/$asset"

          $assets = gh release view $env:RELEASE_TAG `
            --repo $env:GITHUB_REPOSITORY `
            --json assets `
            --jq '.assets[].name'

          foreach ($name in $assets) {
            if ($name -like "labradorcli-$version-windows-*") {
              gh release delete-asset $env:RELEASE_TAG $name `
                --repo $env:GITHUB_REPOSITORY `
                --yes
            }
          }

          gh release upload $env:RELEASE_TAG "dist/$asset" `
            --repo $env:GITHUB_REPOSITORY `
            --clobber
