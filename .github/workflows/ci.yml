name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C debuginfo=line-tables-only --cfg=web_sys_unstable_apis

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: cargo check + build tests
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: cargo check --bin dev -p warp
        run: cargo check --bin dev -p warp

      - name: cargo build --tests --lib -p warp
        run: cargo build --tests --lib -p warp
